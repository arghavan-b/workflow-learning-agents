<!doctype html>
<html>
<head><title>Create issue</title></head>
<body>
  <h1>Create a new issue</h1>
  <form>
    <!-- Volatile React ids changed; labels/placeholders reworded by a redesign.
         The demo's selectors and exact labels no longer match, so the executor
         must self-heal by re-grounding semantically. -->
    <label for="title-field-8f2a">Issue title</label>
    <input id="title-field-8f2a" name="title" type="text"
           aria-label="Issue title" placeholder="Issue title" />

    <label for="body-field-8f2a">Markdown body</label>
    <textarea id="body-field-8f2a" name="body"
              aria-label="Markdown body"
              placeholder="Leave a comment"></textarea>

    <button type="submit">Submit new issue</button>
  </form>
</body>
</html>
