<svg width="680" height="672" viewBox="0 0 680 672" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
<title>Demo2Skill architecture</title>
<desc>A central pipeline turns a demonstration into a workflow skill, then executes it. A repair loop self-heals runs and a training bridge exports verified trajectories to train a policy that feeds back into ingestion.</desc>
<defs>
<marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#94a3b8" stroke-width="1.6"/></marker>
<style>
.box{fill:#dbeafe;stroke:#3b82f6;stroke-width:1.5;}
.boxa{fill:#fef3c7;stroke:#f59e0b;stroke-width:1.5;}
.th{font-size:14px;font-weight:600;fill:#1e3a5f;}
.tha{font-size:14px;font-weight:600;fill:#7c4a03;}
.ts{font-size:12px;fill:#3b5b82;}
.tsa{font-size:12px;fill:#92600a;}
.lbl{font-size:12px;fill:#64748b;}
.lbla{font-size:12px;fill:#d97706;}
</style>
</defs>

<rect x="40" y="16" width="14" height="14" rx="3" class="box"/>
<text class="lbl" x="60" y="27">Skill pipeline</text>
<rect x="190" y="16" width="14" height="14" rx="3" class="boxa"/>
<text class="lbl" x="210" y="27">Training bridge (the papers)</text>

<line x1="340" y1="102" x2="340" y2="138" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah)"/>
<line x1="340" y1="190" x2="340" y2="226" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah)"/>
<line x1="340" y1="278" x2="340" y2="314" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah)"/>
<line x1="340" y1="374" x2="340" y2="418" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah)"/>

<rect class="box" x="225" y="52" width="230" height="50" rx="8"/>
<text class="th" x="340" y="78" text-anchor="middle">Demonstration</text>
<text class="ts" x="340" y="93" text-anchor="middle">screen recording or recorder</text>

<rect class="box" x="225" y="140" width="230" height="50" rx="8"/>
<text class="th" x="340" y="166" text-anchor="middle">Ingestion → raw trace</text>
<text class="ts" x="340" y="181" text-anchor="middle">IDM · state-diff · app graph</text>

<rect class="box" x="225" y="228" width="230" height="50" rx="8"/>
<text class="th" x="340" y="254" text-anchor="middle">Normalize + induce</text>
<text class="ts" x="340" y="269" text-anchor="middle">segment · variabilize · generate</text>

<rect class="box" x="208" y="316" width="264" height="58" rx="9" stroke="#1d4ed8" stroke-width="2.4"/>
<text class="th" x="340" y="342" text-anchor="middle">WorkflowSkill YAML</text>
<text class="ts" x="340" y="359" text-anchor="middle">procedural memory · store</text>

<rect class="box" x="225" y="420" width="230" height="50" rx="8"/>
<text class="th" x="340" y="446" text-anchor="middle">Execute + verify</text>
<text class="ts" x="340" y="461" text-anchor="middle">bind · ground · act · check</text>

<rect class="box" x="45" y="420" width="145" height="50" rx="8"/>
<text class="th" x="117" y="446" text-anchor="middle">Repair loop</text>
<text class="ts" x="117" y="461" text-anchor="middle">bounded · gated</text>

<line x1="225" y1="438" x2="194" y2="438" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah)"/>
<line x1="190" y1="455" x2="221" y2="455" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah)"/>

<path d="M117,420 C 60,398 58,360 204,345" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ah)"/>
<text class="lbl" x="46" y="392">repaired v2 → store</text>

<path d="M455,445 C 502,468 514,492 533,510" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah)"/>
<text class="lbl" x="468" y="500">RunResult</text>

<rect class="boxa" x="440" y="512" width="190" height="50" rx="8"/>
<text class="tha" x="535" y="538" text-anchor="middle">Export</text>
<text class="tsa" x="535" y="553" text-anchor="middle">verified trajectory.jsonl</text>

<line x1="535" y1="562" x2="535" y2="594" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah)"/>

<rect class="boxa" x="440" y="596" width="190" height="50" rx="8"/>
<text class="tha" x="535" y="622" text-anchor="middle">Train / SFT policy</text>
<text class="tsa" x="535" y="637" text-anchor="middle">Paper 1/2 recipe</text>

<path d="M630,621 H662 V160 H459" fill="none" stroke="#d97706" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ah)"/>
<text class="lbla" x="553" y="132" text-anchor="middle">better backend</text>
</svg>
